<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Likes - Apple Style</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Reset & Base */
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
body { background: linear-gradient(135deg,#f0f0f5,#dfe4f7); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
.app-container { background:#fff; max-width:600px; width:100%; border-radius:25px; box-shadow:0 20px 40px rgba(0,0,0,0.1); padding:40px; transition:all 0.3s ease; }
header h1 { text-align:center; font-size:2rem; font-weight:700; color:#1d1d1f; animation:fadeIn 1s ease; }
header p { text-align:center; color:#6e6e73; margin-bottom:30px; animation:fadeIn 1.2s ease; }

/* Form */
.like-form input { width:100%; padding:15px; margin-bottom:20px; border:none; border-radius:15px; background:#f2f2f7; font-size:16px; transition:0.3s; }
.like-form input:focus { outline:none; background:#e0e0f0; }
.like-form button { width:100%; padding:15px; border:none; border-radius:15px; background:linear-gradient(135deg,#ff9500,#ff5e3a); color:white; font-size:16px; cursor:pointer; transition:0.3s; }
.like-form button:hover { background:linear-gradient(135deg,#ff5e3a,#ff9500); }

/* Result Card */
.result-card { margin-top:30px; background:rgba(242,242,247,0.9); padding:20px; border-radius:20px; box-shadow: inset 0 5px 10px rgba(0,0,0,0.05); font-size:14px; color:#1d1d1f; white-space:pre-wrap; animation:fadeIn 0.5s ease; }

/* Footer */
footer { text-align:center; margin-top:30px; color:#8e8e93; }
footer a { color:#007aff; text-decoration:none; }

/* Animations */
@keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }

/* Glassmorphism & Gradient Animated BG */
body::before {
    content:""; position:fixed; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(45deg,#ff9500,#ff5e3a,#ff2d55,#5856d6,#5ac8fa,#34c759);
    background-size:600% 600%; z-index:-1; animation:bgAnimate 20s ease infinite;
}
@keyframes bgAnimate { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }
</style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5847508068424077"
     crossorigin="anonymous"></script>
</head>
<body>
<div class="app-container">
    <header>
        <h1>🔥 Free Fire Likes</h1>
        <p> 💎VIP💎 </p>
    </header>
    <main>
        <form id="likeForm" class="like-form">
            <input type="text" id="uid" name="uid" placeholder="Enter UID" required>
            <input type="text" id="server_name" name="server_name" placeholder="Server Name (IND, US, BR...)">
            <button type="submit">Send Likes</button>
        </form>

        <div id="result" class="result-card" style="display:none;"></div>
    </main>
    <footer>
        <p>Made by <a href="https://www.youtube.com/@Creator.9XED" target="_blank">Creator.9XED</a></p>
    </footer>
</div>

<script>
const form = document.getElementById("likeForm");
const resultDiv = document.getElementById("result");

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const uid = document.getElementById("uid").value;
    const server_name = document.getElementById("server_name").value;
    let url = `/like?uid=${uid}`;
    if (server_name) url += `&server_name=${server_name}`;

    resultDiv.style.display = "block";
    resultDiv.innerHTML = "Processing...";

    try {
        const res = await fetch(url);
        const data = await res.json();
        let content = "";
        if(data.error){
            content = `❌ Error: ${data.error}`;
        } else {
            content = `✅ Likes Given: ${data.LikesGivenByAPI}\n` +
                      `Before: ${data.LikesbeforeCommand}\n` +
                      `After: ${data.LikesafterCommand}\n` +
                      `Player: ${data.PlayerNickname}\n` +
                      `Region: ${data.Region}\n` +
                      `UID: ${data.UID}`;
        }
        resultDiv.innerHTML = content;
    } catch (err) {
        resultDiv.innerHTML = "❌ Error: " + err.message;
    }
});
</script>
</body>
</html>
