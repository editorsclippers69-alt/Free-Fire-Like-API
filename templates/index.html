<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9XED FF Likes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }

body {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  overflow:hidden;
  color:#fff;
  position:relative;
}

/* Background */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    background: linear-gradient(45deg,#001f3f,#003366,#004080,#0059b3,#001a66,#00264d);
    background-size:600% 600%;
    animation:bgAnimate 30s ease infinite;
}
@keyframes bgAnimate {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Main Container FIXED SIZE */
.app-container { 
    position: relative;
    height: 420px;
    max-width:600px;
    width:100%;
    padding:40px;
    border-radius:25px;

    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(25px);
    box-shadow:0 20px 40px rgba(0,0,0,0.2);

    overflow:hidden;
}

/* Header */
header h1 {
  text-align:center;
  font-size:2rem;
  color:#00d0ff;
  animation:fadeInUp 1s ease forwards;
}
header p {
  text-align:center;
  color:#a0dfff;
  margin-bottom:30px;
  font-weight:600;
  animation:fadeInUp 1.3s ease forwards;
}
@keyframes fadeInUp {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* Form */
.like-form input {
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    border-radius:15px;
    background: rgba(255,255,255,0.15);
    color:#fff;
}
.like-form input::placeholder {
    color: rgba(255,255,255,0.6);
}
.like-form input:focus {
    outline:none;
    background: rgba(255,255,255,0.25);
}

/* Button */
.like-form button {
    position:relative;
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background: rgba(255,255,255,0.1);
    color:white;
    cursor:pointer;
    overflow:hidden;
    backdrop-filter: blur(15px);
}

/* Light sweep */
.like-form button::before {
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background: rgba(255,255,255,0.25);
    transform: skewX(20deg);
    transition: left 0.8s ease;
}
.like-form button:hover::before {
    left:140%;
}

/* RESULT CARD CENTERED */
.result-card { 
    position:absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%) scale(0.8);

    width:85%;
    padding:20px;
    border-radius:20px;

    background: rgba(255,255,255,0.1);
    box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);

    font-size:14px;
    white-space: pre-wrap;

    opacity:0;
    transition: all 1s cubic-bezier(.68,-0.55,.27,1.55);
}

/* Footer */
footer {
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#8e8e93;
}
footer a { color:#00d0ff; text-decoration:none; }

/* Confetti */
.confetti {
    position:fixed;
    top:0;
    left:50%;
    width:10px;
    height:10px;
    pointer-events:none;
    animation:fall 4s linear forwards;
}
@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(800px) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<div class="app-container">

<header>
    <h1>🔥 Free Fire Likes</h1>
    <p>💎VIP💎 ✨Boost Your Likes!✨</p>
</header><form id="likeForm" class="like-form">
    <input type="text" id="uid" placeholder="Enter Free fire UID" required>
    <input type="text" id="server_name" placeholder="Server Name (IND, US, BR...)">
    <button type="submit">Send Likes</button>
</form><div id="result" class="result-card"></div><pre> <footer>Made by <a href="https://www.youtube.com/@Creator.9XED">Creator.9XED                </a> 
</footer></pre>

</div>

<script>
const form = document.getElementById("likeForm");
const resultDiv = document.getElementById("result");

/* Confetti */
function createConfetti(count=60){
    for(let i=0;i<count;i++){
        const c = document.createElement('div');
        c.classList.add('confetti');
        c.style.left = Math.random()*100 + 'vw';
        c.style.background = `hsl(${Math.random()*360},80%,60%)`;
        c.style.animationDuration = 2 + Math.random()*1.5 + 's';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const uid = document.getElementById("uid").value;
    const server = document.getElementById("server_name").value;

    let url = `/like?uid=${uid}`;
    if(server) url += `&server_name=${server}`;

    /* Hide form without resizing */
    form.style.visibility = "hidden";
    form.style.position = "absolute";

    resultDiv.innerHTML = "Processing...";

    try {
        const res = await fetch(url);
        const data = await res.json();

        let content = data.error
            ? `❌ Error: ${data.error}`
            : `✅ Likes Given: ${data.LikesGivenByAPI}
Before: ${data.LikesbeforeCommand}
After: ${data.LikesafterCommand}
Player: ${data.PlayerNickname}
Region: ${data.Region}
UID: ${data.UID}`;

        resultDiv.innerHTML = content;

        setTimeout(()=>{
            resultDiv.style.opacity = "1";
            resultDiv.style.transform = "translate(-50%, -50%) scale(1)";
        },200);

        createConfetti();

    } catch(err){
        resultDiv.innerHTML = "❌ Error: " + err.message;
        createConfetti(20);
    }
});
</script>

</body>
</html>
