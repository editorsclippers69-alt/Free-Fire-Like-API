<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Like API</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #ff6600; }
        input[type=text] { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #ff6600; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #e65c00; }
        .result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; border: 1px solid #ddd; white-space: pre-wrap; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Free Fire Like API</h1>
        <form id="likeForm">
            <label>UID:</label>
            <input type="text" name="uid" id="uid" required placeholder="Enter player UID">
            
            <label>Server Name (optional):</label>
            <input type="text" name="server_name" id="server_name" placeholder="IND, BR, US, etc.">
            
            <button type="submit">Send Likes</button>
        </form>

        <div class="result" id="result" style="display:none;"></div>
    </div>

    <script>
        const form = document.getElementById("likeForm");
        const resultDiv = document.getElementById("result");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const uid = document.getElementById("uid").value;
            const server_name = document.getElementById("server_name").value;
            
            let url = `/like?uid=${uid}`;
            if (server_name) url += `&server_name=${server_name}`;

            resultDiv.style.display = "block";
            resultDiv.innerHTML = "Processing...";

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    resultDiv.innerHTML = `<span class="error">${data.error}</span>`;
                } else {
                    resultDiv.innerHTML = `<span class="success">Success!</span>\n<pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<span class="error">Error: ${err.message}</span>`;
            }
        });
    </script>
</body>
</html>
